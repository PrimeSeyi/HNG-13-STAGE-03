version: '3.8'

  HNG-nginx-logs:
    name: HNG-nginx-logs  # Force exact name — Docker Compose won't prepend project prefix
  nextcloud_data:
  db_data:

services:
  db:
    image: mariadb:10.6
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=secure_root_password
      - MYSQL_PASSWORD=secure_nextcloud_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  nextcloud:
    image: kefaslungu/hng-nextcloud  # Pre-built image specified in instructions — do not change
    restart: always
    links:
      - db
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      - MYSQL_PASSWORD=secure_nextcloud_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud

  detector:
    build: ./detector
    restart: always
    network_mode: "host"  # Required so iptables rules affect the host machine's firewall
    cap_add:
      - NET_ADMIN         # Required permission to execute iptables modifications
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro  # Read-only mount of Nginx JSON logs
    # To run sudo iptables passwordless inside the container:
    user: root 
